<!DOCTYPE html>
<html>
<head>
    <title>Company Drives</title>
</head>

<body>

<h1>Your Drives</h1>

<table border="1">

<tr>
    <th>Job Title</th>
    <th>Description</th>
    <th>Deadline</th>
</tr>

{% for drive in drives %}

<tr>
    <td>{{ drive.job_title }}</td>
    <td>{{ drive.job_description }}</td>
    <td>{{ drive.application_deadline }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/company_dashboard">Back</a>

</body>
</html>
