<!DOCTYPE html>
<html>
<head>
    <title>Registered Companies</title>
</head>

<body>

<h1>Registered Companies</h1>

<table border="1">

<tr>
    <th>Company Name</th>
    <th>Description</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for company in companies %}

<tr>
    <td>{{ company.name }}</td>
    <td>{{ company.description }}</td>
    <td>{{ company.status }}</td>

    <td>
        <a href="/admin/approve_company/{{ company.id }}">Approve</a>
        |
        <a href="/admin/blacklist_company/{{ company.id }}">Blacklist</a>
    </td>

</tr>

{% endfor %}

</table>

<br>
<a href="/admin_dashboard">Back</a>

</body>
</html>
